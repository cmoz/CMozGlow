sentence=Beginner-friendly WS2812B/NeoPixel library for ESP32 boards with plain-English error handling and wearable power budgeting.
paragraph=Works on ESP32-S3, S2, C3 and the classic ESP32. Non-blocking fashion-tech effects (Sequin, Catwalk, Loom, Silk, Aurora, Heartbeat, Firefly, Ember, Morse messenger), automatic current limiting for battery safety, a live status pixel, async RMT engine, and optional dual-core AutoPilot mode. Onboard pixel on GPIO 3 for the CMoz ESP32-S3 Mini; any valid pin on other boards.
